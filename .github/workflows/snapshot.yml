name: Fetch orbital snapshot

# Runs at :19 past every hour — off-peak minute per Space-Track guidance.
on:
  schedule:
    - cron: "19 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Prevent overlapping runs.
concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # allows committing the snapshot back to the repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Fetch snapshot
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: python fetch_snapshot.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "snapshot-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/
          git commit -m "snapshot $(date -u +%FT%TZ)" || echo "no changes"
          git push
